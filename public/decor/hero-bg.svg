<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#FBF8F3"/>
      <stop offset="100%" stop-color="#F5EFE6"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1600" fill="url(#bg-grad)"/>
  <rect width="1200" height="1600" fill="url(#halo)"/>

  <!-- Top wreath: pampas grass + eucalyptus + roses -->
  <g opacity="0.85">
    <!-- Left branch -->
    <g transform="translate(0,0)" stroke="#B89968" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M120 220 C 200 260, 280 300, 360 360"/>
      <path d="M180 180 C 220 240, 260 290, 320 340"/>
      <path d="M250 140 C 280 200, 310 260, 340 320"/>
    </g>
    <g fill="#B8D8C0" opacity="0.85">
      <ellipse cx="180" cy="240" rx="32" ry="13" transform="rotate(-30 180 240)"/>
      <ellipse cx="230" cy="290" rx="32" ry="13" transform="rotate(-30 230 290)"/>
      <ellipse cx="280" cy="340" rx="32" ry="13" transform="rotate(-30 280 340)"/>
      <ellipse cx="220" cy="200" rx="28" ry="11" transform="rotate(-45 220 200)"/>
      <ellipse cx="270" cy="250" rx="28" ry="11" transform="rotate(-45 270 250)"/>
    </g>
    <g fill="#F2A48E" opacity="0.6">
      <ellipse cx="140" cy="200" rx="28" ry="80" transform="rotate(15 140 200)"/>
      <ellipse cx="170" cy="160" rx="22" ry="70" transform="rotate(20 170 160)"/>
      <ellipse cx="100" cy="240" rx="22" ry="70" transform="rotate(10 100 240)"/>
    </g>
    <g fill="#F0C4C4">
      <circle cx="220" cy="320" r="22"/>
      <circle cx="290" cy="370" r="18"/>
      <circle cx="160" cy="280" r="16"/>
      <circle cx="350" cy="350" r="14" fill="#D4A5A5"/>
    </g>

    <!-- Right branch (mirrored) -->
    <g transform="translate(1200,0) scale(-1,1)" stroke="#B89968" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M120 220 C 200 260, 280 300, 360 360"/>
      <path d="M180 180 C 220 240, 260 290, 320 340"/>
      <path d="M250 140 C 280 200, 310 260, 340 320"/>
    </g>
    <g transform="translate(1200,0) scale(-1,1)" fill="#B8D8C0" opacity="0.85">
      <ellipse cx="180" cy="240" rx="32" ry="13" transform="rotate(-30 180 240)"/>
      <ellipse cx="230" cy="290" rx="32" ry="13" transform="rotate(-30 230 290)"/>
      <ellipse cx="280" cy="340" rx="32" ry="13" transform="rotate(-30 280 340)"/>
      <ellipse cx="220" cy="200" rx="28" ry="11" transform="rotate(-45 220 200)"/>
      <ellipse cx="270" cy="250" rx="28" ry="11" transform="rotate(-45 270 250)"/>
    </g>
    <g transform="translate(1200,0) scale(-1,1)" fill="#F2A48E" opacity="0.6">
      <ellipse cx="140" cy="200" rx="28" ry="80" transform="rotate(15 140 200)"/>
      <ellipse cx="170" cy="160" rx="22" ry="70" transform="rotate(20 170 160)"/>
      <ellipse cx="100" cy="240" rx="22" ry="70" transform="rotate(10 100 240)"/>
    </g>
    <g transform="translate(1200,0) scale(-1,1)" fill="#F0C4C4">
      <circle cx="220" cy="320" r="22"/>
      <circle cx="290" cy="370" r="18"/>
      <circle cx="160" cy="280" r="16"/>
      <circle cx="350" cy="350" r="14" fill="#D4A5A5"/>
    </g>
  </g>

  <!-- Bottom wreath (mirrored vertically) -->
  <g transform="translate(0, 1600) scale(1, -1)" opacity="0.65">
    <g stroke="#B89968" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M120 220 C 200 260, 280 300, 360 360"/>
      <path d="M180 180 C 220 240, 260 290, 320 340"/>
    </g>
    <g fill="#B8D8C0" opacity="0.85">
      <ellipse cx="180" cy="240" rx="32" ry="13" transform="rotate(-30 180 240)"/>
      <ellipse cx="230" cy="290" rx="32" ry="13" transform="rotate(-30 230 290)"/>
      <ellipse cx="280" cy="340" rx="32" ry="13" transform="rotate(-30 280 340)"/>
    </g>
    <g fill="#F0C4C4">
      <circle cx="220" cy="320" r="20"/>
      <circle cx="290" cy="370" r="16"/>
    </g>

    <g transform="translate(1200,0) scale(-1,1)">
      <g stroke="#B89968" stroke-width="2.5" stroke-linecap="round" fill="none">
        <path d="M120 220 C 200 260, 280 300, 360 360"/>
        <path d="M180 180 C 220 240, 260 290, 320 340"/>
      </g>
      <g fill="#B8D8C0" opacity="0.85">
        <ellipse cx="180" cy="240" rx="32" ry="13" transform="rotate(-30 180 240)"/>
        <ellipse cx="230" cy="290" rx="32" ry="13" transform="rotate(-30 230 290)"/>
        <ellipse cx="280" cy="340" rx="32" ry="13" transform="rotate(-30 280 340)"/>
      </g>
      <g fill="#F0C4C4">
        <circle cx="220" cy="320" r="20"/>
        <circle cx="290" cy="370" r="16"/>
      </g>
    </g>
  </g>

  <!-- Subtle spread of pollen/stars in middle -->
  <g fill="#B89968" opacity="0.25">
    <circle cx="200" cy="800" r="2"/>
    <circle cx="350" cy="900" r="1.5"/>
    <circle cx="500" cy="850" r="2"/>
    <circle cx="700" cy="900" r="1.5"/>
    <circle cx="850" cy="820" r="2"/>
    <circle cx="1000" cy="880" r="1.5"/>
    <circle cx="950" cy="950" r="2"/>
    <circle cx="250" cy="950" r="1.5"/>
  </g>
</svg>
